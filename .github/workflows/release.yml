name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  winlinx:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'

      - name: Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing \
            build-essential \
            jq \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev

      - name: Install Wails v3
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run wails doctor
        run: wails3 doctor

      - name: Build Windows
        run: |
          go mod tidy
          wails3 task build:windows:prod

      - name: Build Linux
        run: |
          wails3 task build:linux

      - name: Get version
        run: |
          VERSION=$(jq -r '.info."0000".ProductVersion' build/info.json)
          echo "VERSION=v$VERSION" >> "$GITHUB_ENV"

      - name: Archive Windows
        run: |
          cd .bin
          zip kubegui-windows-x86_64.zip kubegui.exe

      - name: Archive Linux
        run: |
          cd .bin
          zip kubegui-linux-amd64.zip kubegui

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        env:
          VERSION: ${{ env.VERSION }}
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          generate_release_notes: true
          files: |
            ${{ github.workspace }}/.bin/*.zip
