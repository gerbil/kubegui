# This file contains the configuration for this project.
# When you update `info` or `fileAssociations`, run `wails3 task common:update:build-assets` to update the assets.
# Note that this will overwrite any changes you have made to the assets.
version: '3'
# This information is used to generate the build assets.
info:
  companyName: "Yuriy Kobets" # The name of the company
  productName: "Kubegui" # The name of the application
  productIdentifier: "kubegui.net" # The unique product identifier
  description: "Kubernetes admin desktop client" # The application description
  copyright: "(c) 2026, Kubegui" # Copyright text
  comments: "Kubernetes admin desktop client" # Comments
  version: "2.0.3" # The application version
# Dev mode configuration
dev_mode:
  root_path: .
  log_level: warn
  debounce: 200
  ignore:
    dir:
      - .git
      - node_modules
      - bin
      - backend
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
    git_ignore: true
  executes:
    - cmd: wails3 task generate:bindings
      type: once
    - cmd: wails3 task install:frontend:deps
      type: once
    - cmd: wails3 task dev:frontend
      type: background
    - cmd: go mod tidy
      type: blocking
    - cmd: wails3 task build:windows:dev
      type: blocking
    - cmd: wails3 task run
      type: primary
# File Associations
# More information at: https://v3.wails.io/noit/done/yet
fileAssociations:
#  - ext: wails
#    name: Wails
#    description: Wails Application File
#    iconName: wailsFileIcon
#    role: Editor
#  - ext: jpg
#    name: JPEG
#    description: Image File
