# Manually declared production npm dependencies for the Wails frontend.
# The npm auto-target is disabled in .fossa.yml to prevent build-only
# devDependencies (e.g. vite → lightningcss MPL-2.0) from appearing in
# the license scan. Keep this list in sync with ui/package.json "dependencies".
